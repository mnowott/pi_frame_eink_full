AWSTemplateFormatVersion: '2010-09-09'
Description: |
  Bootstrap stack for ImageUiApp infrastructure management.
  Creates:
    1. A programmatic-only IAM user (default name: imageuiapp-admin).
       NO console password is created. The user has inline permissions
       only to manage their own MFA device and assume the admin role.
    2. The imageuiapp-admin IAM role with scoped permissions (EC2,
       IAM-on-imageuiapp*, S3-readonly on the configured bucket,
       ALB/ACM/Route53 cleanup). The role trusts the user above and is
       MFA-gated by default.
  After the stack reaches CREATE_COMPLETE, root completes 2 manual steps
  in the IAM console (one-time):
    a) Assign a virtual MFA device to the new user. Save the MFA serial.
    b) Create one access key for the new user. Save the key id + secret
       into ~/.aws/credentials on the laptop.
  Then root locks itself away and never touches AWS for daily IaC.

Parameters:
  AdminUserName:
    Type: String
    Default: imageuiapp-admin
    AllowedPattern: '^[\w+=,.@\-]{1,64}$'
    Description: Name of the IAM user the stack will create.

  RequireMFA:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'
    Description: When 'true', the AssumeRole call must present a valid MFA code.

  S3BucketArn:
    Type: String
    Description: ARN of the existing S3 bucket Terraform manages.
    AllowedPattern: '^arn:aws:s3:::[a-z0-9.\-]{3,63}$'

  RoleName:
    Type: String
    Default: imageuiapp-admin
    AllowedPattern: '^[\w+=,.@\-]{1,64}$'
    Description: Name of the IAM role to create.

  MaxSessionDurationSeconds:
    Type: Number
    Default: 3600
    MinValue: 900
    MaxValue: 43200
    Description: Maximum session duration (15 min - 12 h) for assumed sessions.

Conditions:
  EnforceMFA: !Equals [!Ref RequireMFA, 'true']

Resources:

  ##############################
  # 1. The admin IAM user
  ##############################

  # No LoginProfile -> no console password -> no console sign-in for this
  # user. Daily work is access-key + MFA + sts:AssumeRole, nothing else.
  AdminUser:
    Type: AWS::IAM::User
    Properties:
      UserName: !Ref AdminUserName
      Tags:
        - Key: Project
          Value: pi-epaper-photo-frame
        - Key: App
          Value: imageuiapp
        - Key: ManagedBy
          Value: cloudformation

  # Bootstrap permissions: only what the user needs BEFORE assuming the
  # admin role. They can resync their own MFA device (rotate authenticator)
  # and call sts:AssumeRole on the role. Everything else (EC2, IAM
  # management, S3) is delegated to the role and gated by MFA.
  AdminUserBootstrapPolicy:
    Type: AWS::IAM::UserPolicy
    Properties:
      UserName: !Ref AdminUser
      PolicyName: bootstrap-self-service-and-assume
      PolicyDocument:
        Version: '2012-10-17'
        Statement:

          - Sid: ViewOwnUserAndAccount
            Effect: Allow
            Action:
              - 'iam:GetUser'
              - 'iam:ListMFADevices'
              - 'iam:ListVirtualMFADevices'
              - 'iam:GetAccountSummary'
            Resource: '*'

          - Sid: ManageOwnMfaDevice
            Effect: Allow
            Action:
              - 'iam:ResyncMFADevice'
            Resource:
              - !Sub 'arn:aws:iam::${AWS::AccountId}:user/${AdminUserName}'
              - !Sub 'arn:aws:iam::${AWS::AccountId}:mfa/${AdminUserName}'

          - Sid: AssumeAdminRole
            Effect: Allow
            Action: 'sts:AssumeRole'
            Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/${RoleName}'

  ##############################
  # 2. The admin IAM role
  ##############################

  AdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      MaxSessionDuration: !Ref MaxSessionDurationSeconds
      Description: |
        Assume-role for managing ImageUiApp Terraform infrastructure
        (EC2, IAM, S3 bucket reference, ALB cleanup). Trusts the
        AdminUser created in this stack. MFA enforced when the stack
        was created with RequireMFA=true.
      # Use !GetAtt so CloudFormation waits for AdminUser before creating
      # AdminRole. Constructing the ARN with !Sub creates no dependency,
      # CFN parallelises the two, and IAM rejects the trust policy with
      # "Invalid principal" because the user does not exist yet.
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !GetAtt AdminUser.Arn
            Action: sts:AssumeRole
            Condition: !If
              - EnforceMFA
              - Bool: { 'aws:MultiFactorAuthPresent': 'true' }
              - !Ref AWS::NoValue
      Tags:
        - Key: Project
          Value: pi-epaper-photo-frame
        - Key: App
          Value: imageuiapp
        - Key: ManagedBy
          Value: cloudformation
      Policies:

        - PolicyName: ec2-management
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ec2:Describe*'
                  - 'ec2:Get*'
                  - 'ec2:RunInstances'
                  - 'ec2:TerminateInstances'
                  - 'ec2:StartInstances'
                  - 'ec2:StopInstances'
                  - 'ec2:RebootInstances'
                  - 'ec2:ModifyInstanceAttribute'
                  - 'ec2:ModifyInstanceMetadataOptions'
                  - 'ec2:CreateTags'
                  - 'ec2:DeleteTags'
                  - 'ec2:CreateSecurityGroup'
                  - 'ec2:DeleteSecurityGroup'
                  - 'ec2:AuthorizeSecurityGroupIngress'
                  - 'ec2:AuthorizeSecurityGroupEgress'
                  - 'ec2:RevokeSecurityGroupIngress'
                  - 'ec2:RevokeSecurityGroupEgress'
                  - 'ec2:UpdateSecurityGroupRuleDescriptionsIngress'
                  - 'ec2:UpdateSecurityGroupRuleDescriptionsEgress'
                  - 'ec2:AllocateAddress'
                  - 'ec2:ReleaseAddress'
                  - 'ec2:AssociateAddress'
                  - 'ec2:DisassociateAddress'
                  - 'ec2:CreateVolume'
                  - 'ec2:AttachVolume'
                  - 'ec2:DetachVolume'
                  - 'ec2:DeleteVolume'
                  - 'ec2:ModifyVolume'
                Resource: '*'

        - PolicyName: iam-imageuiapp-scoped
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'iam:CreateRole'
                  - 'iam:DeleteRole'
                  - 'iam:GetRole'
                  - 'iam:UpdateRole'
                  - 'iam:UpdateRoleDescription'
                  - 'iam:PassRole'
                  - 'iam:TagRole'
                  - 'iam:UntagRole'
                  - 'iam:ListRoleTags'
                  - 'iam:AttachRolePolicy'
                  - 'iam:DetachRolePolicy'
                  - 'iam:PutRolePolicy'
                  - 'iam:GetRolePolicy'
                  - 'iam:DeleteRolePolicy'
                  - 'iam:ListAttachedRolePolicies'
                  - 'iam:ListRolePolicies'
                  - 'iam:CreateInstanceProfile'
                  - 'iam:DeleteInstanceProfile'
                  - 'iam:GetInstanceProfile'
                  - 'iam:AddRoleToInstanceProfile'
                  - 'iam:RemoveRoleFromInstanceProfile'
                  - 'iam:TagInstanceProfile'
                  - 'iam:UntagInstanceProfile'
                  - 'iam:ListInstanceProfiles'
                  - 'iam:ListInstanceProfilesForRole'
                Resource:
                  - !Sub 'arn:aws:iam::${AWS::AccountId}:role/imageuiapp*'
                  - !Sub 'arn:aws:iam::${AWS::AccountId}:instance-profile/imageuiapp*'

        - PolicyName: s3-bucket-readonly
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  # Wildcard read of all bucket-level attributes (CORS,
                  # logging, lifecycle, notification, ownership, etc.).
                  # Terraform's bucket refresh reads ~15 of these on every
                  # plan, so explicit lists go stale fast.
                  - 's3:Get*'
                  - 's3:List*'
                  # Bucket tagging is the one mutation Terraform may need
                  # if you change the var.tags map.
                  - 's3:PutBucketTagging'
                Resource: !Ref S3BucketArn
              - Effect: Allow
                Action:
                  - 's3:GetObject'
                  - 's3:GetObjectTagging'
                  - 's3:GetObjectVersion'
                  - 's3:ListBucketVersions'
                Resource: !Sub '${S3BucketArn}/*'

        - PolicyName: alb-cleanup
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'elasticloadbalancing:Describe*'
                  - 'elasticloadbalancing:DeleteLoadBalancer'
                  - 'elasticloadbalancing:DeleteListener'
                  - 'elasticloadbalancing:DeleteTargetGroup'
                  - 'elasticloadbalancing:RemoveTags'
                Resource: '*'

        - PolicyName: acm-cleanup
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'acm:DescribeCertificate'
                  - 'acm:ListCertificates'
                  - 'acm:DeleteCertificate'
                  - 'acm:ListTagsForCertificate'
                Resource: '*'

        - PolicyName: route53-records
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'route53:GetHostedZone'
                  - 'route53:ListHostedZones'
                  - 'route53:ListHostedZonesByName'
                  - 'route53:ListResourceRecordSets'
                  - 'route53:ChangeResourceRecordSets'
                  - 'route53:GetChange'
                Resource: '*'

        - PolicyName: cost-audit-readonly
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Cost Explorer (the "Cost Explorer" UI + API).
              - Effect: Allow
                Action:
                  - 'ce:GetCostAndUsage'
                  - 'ce:GetCostAndUsageWithResources'
                  - 'ce:GetCostForecast'
                  - 'ce:GetUsageForecast'
                  - 'ce:GetReservationCoverage'
                  - 'ce:GetReservationUtilization'
                  - 'ce:GetReservationPurchaseRecommendation'
                  - 'ce:GetSavingsPlansCoverage'
                  - 'ce:GetSavingsPlansUtilization'
                  - 'ce:GetSavingsPlansUtilizationDetails'
                  - 'ce:GetTags'
                  - 'ce:GetDimensionValues'
                  - 'ce:GetCostCategories'
                  - 'ce:GetAnomalies'
                  - 'ce:GetAnomalyMonitors'
                  - 'ce:GetAnomalySubscriptions'
                  - 'ce:DescribeCostCategoryDefinition'
                  - 'ce:ListCostAllocationTags'
                  - 'ce:ListCostCategoryDefinitions'
                Resource: '*'
              # Budgets read.
              - Effect: Allow
                Action:
                  - 'budgets:ViewBudget'
                  - 'budgets:DescribeBudget'
                  - 'budgets:DescribeBudgets'
                  - 'budgets:DescribeBudgetActionsForBudget'
                  - 'budgets:DescribeBudgetActionHistories'
                  - 'budgets:DescribeNotificationsForBudget'
                  - 'budgets:DescribeSubscribersForNotification'
                Resource: '*'
              # Cost and Usage Reports definitions (CUR).
              - Effect: Allow
                Action:
                  - 'cur:DescribeReportDefinitions'
                Resource: '*'
              # Pricing API (look up on-demand prices).
              - Effect: Allow
                Action:
                  - 'pricing:DescribeServices'
                  - 'pricing:GetAttributeValues'
                  - 'pricing:GetProducts'
                Resource: '*'
              # Account contact info / regions enabled / org info often
              # needed by reporting tools.
              - Effect: Allow
                Action:
                  - 'account:GetContactInformation'
                  - 'account:ListRegions'
                  - 'organizations:DescribeOrganization'
                Resource: '*'

Outputs:

  AdminUserName:
    Description: Name of the new programmatic-only IAM user (no console access).
    Value: !Ref AdminUser

  AdminUserArn:
    Description: ARN of the new IAM user.
    Value: !GetAtt AdminUser.Arn

  ExpectedMfaSerial:
    Description: |
      The MFA device ARN once you assign a virtual MFA device with the
      same name as the user. Put this in .env as AWS_MFA_SERIAL.
    Value: !Sub 'arn:aws:iam::${AWS::AccountId}:mfa/${AdminUserName}'

  RoleArn:
    Description: ARN of the admin role. Put this in .env as AWS_ADMIN_ROLE_ARN.
    Value: !GetAtt AdminRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RoleArn'

  AssumeRoleSnippet:
    Description: Example aws sts assume-role command.
    Value: !Sub
      - 'aws sts assume-role --role-arn ${RoleArn} --role-session-name imageuiapp-admin'
      - { RoleArn: !GetAtt AdminRole.Arn }
