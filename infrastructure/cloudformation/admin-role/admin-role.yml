AWSTemplateFormatVersion: '2010-09-09'
Description: |
  Bootstrap stack for ImageUiApp infrastructure management.
  Creates:
    1. An IAM user (default name: imageuiapp-admin) with console access,
       a forced password reset on first login, and inline permissions to
       manage their own MFA device, change their password, and assume the
       admin role created below.
    2. The imageuiapp-admin IAM role with the same scoped permissions as
       before (EC2, IAM-on-imageuiapp*, S3-readonly on the configured
       bucket, ALB/ACM/Route53 cleanup). The role trusts the user above,
       MFA-gated by default.
  After the stack reaches CREATE_COMPLETE:
    - Sign in as the new user with InitialPassword. AWS forces a reset.
    - In Security credentials, assign a virtual MFA device.
    - From a terminal, source scripts/aws/assume_admin.sh.

Parameters:
  AdminUserName:
    Type: String
    Default: imageuiapp-admin
    AllowedPattern: '^[\w+=,.@\-]{1,64}$'
    Description: Name of the IAM user the stack will create.

  InitialPassword:
    Type: String
    NoEcho: true
    MinLength: 12
    MaxLength: 128
    Description: |
      One-time console password for the new user. AWS will force a reset
      on first sign-in. Must satisfy your account's IAM password policy
      (at minimum: 12 chars, mixed case, digits, symbols).

  RequireMFA:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'
    Description: When 'true', the AssumeRole call must present a valid MFA code.

  S3BucketArn:
    Type: String
    Description: ARN of the existing S3 bucket Terraform manages.
    AllowedPattern: '^arn:aws:s3:::[a-z0-9.\-]{3,63}$'

  RoleName:
    Type: String
    Default: imageuiapp-admin
    AllowedPattern: '^[\w+=,.@\-]{1,64}$'
    Description: Name of the IAM role to create.

  MaxSessionDurationSeconds:
    Type: Number
    Default: 3600
    MinValue: 900
    MaxValue: 43200
    Description: Maximum session duration (15 min - 12 h) for assumed sessions.

Conditions:
  EnforceMFA: !Equals [!Ref RequireMFA, 'true']

Resources:

  ##############################
  # 1. The admin IAM user
  ##############################

  AdminUser:
    Type: AWS::IAM::User
    Properties:
      UserName: !Ref AdminUserName
      LoginProfile:
        Password: !Ref InitialPassword
        PasswordResetRequired: true
      Tags:
        - Key: Project
          Value: pi-epaper-photo-frame
        - Key: App
          Value: imageuiapp
        - Key: ManagedBy
          Value: cloudformation

  # Bootstrap permissions: this is what the new user can do BEFORE assuming
  # the admin role. Just enough to (a) configure their own MFA device, (b)
  # change their forced password, and (c) call sts:AssumeRole on the admin
  # role. Everything else (EC2, IAM management, S3) is delegated to the
  # admin role and only available after MFA-gated assume-role.
  AdminUserBootstrapPolicy:
    Type: AWS::IAM::UserPolicy
    Properties:
      UserName: !Ref AdminUser
      PolicyName: bootstrap-self-service-and-assume
      PolicyDocument:
        Version: '2012-10-17'
        Statement:

          - Sid: ViewOwnUserAndAccount
            Effect: Allow
            Action:
              - 'iam:GetUser'
              - 'iam:ListMFADevices'
              - 'iam:ListVirtualMFADevices'
              - 'iam:GetAccountPasswordPolicy'
              - 'iam:GetAccountSummary'
            Resource: '*'

          - Sid: ManageOwnMfaDevice
            Effect: Allow
            Action:
              - 'iam:CreateVirtualMFADevice'
              - 'iam:DeleteVirtualMFADevice'
              - 'iam:EnableMFADevice'
              - 'iam:ResyncMFADevice'
              - 'iam:DeactivateMFADevice'
            Resource:
              - !Sub 'arn:aws:iam::${AWS::AccountId}:user/${AdminUserName}'
              - !Sub 'arn:aws:iam::${AWS::AccountId}:mfa/${AdminUserName}'

          - Sid: ChangeOwnPassword
            Effect: Allow
            Action:
              - 'iam:ChangePassword'
              - 'iam:GetLoginProfile'
              - 'iam:UpdateLoginProfile'
            Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:user/${AdminUserName}'

          - Sid: AssumeAdminRole
            Effect: Allow
            Action: 'sts:AssumeRole'
            Resource: !Sub 'arn:aws:iam::${AWS::AccountId}:role/${RoleName}'

  ##############################
  # 2. The admin IAM role
  ##############################

  AdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      MaxSessionDuration: !Ref MaxSessionDurationSeconds
      Description: |
        Assume-role for managing ImageUiApp Terraform infrastructure
        (EC2, IAM, S3 bucket reference, ALB cleanup). Trusts the
        AdminUser created in this stack. MFA enforced when the stack
        was created with RequireMFA=true.
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:user/${AdminUserName}'
            Action: sts:AssumeRole
            Condition: !If
              - EnforceMFA
              - Bool: { 'aws:MultiFactorAuthPresent': 'true' }
              - !Ref AWS::NoValue
      Tags:
        - Key: Project
          Value: pi-epaper-photo-frame
        - Key: App
          Value: imageuiapp
        - Key: ManagedBy
          Value: cloudformation
      Policies:

        - PolicyName: ec2-management
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ec2:Describe*'
                  - 'ec2:Get*'
                  - 'ec2:RunInstances'
                  - 'ec2:TerminateInstances'
                  - 'ec2:StartInstances'
                  - 'ec2:StopInstances'
                  - 'ec2:RebootInstances'
                  - 'ec2:ModifyInstanceAttribute'
                  - 'ec2:ModifyInstanceMetadataOptions'
                  - 'ec2:CreateTags'
                  - 'ec2:DeleteTags'
                  - 'ec2:CreateSecurityGroup'
                  - 'ec2:DeleteSecurityGroup'
                  - 'ec2:AuthorizeSecurityGroupIngress'
                  - 'ec2:AuthorizeSecurityGroupEgress'
                  - 'ec2:RevokeSecurityGroupIngress'
                  - 'ec2:RevokeSecurityGroupEgress'
                  - 'ec2:UpdateSecurityGroupRuleDescriptionsIngress'
                  - 'ec2:UpdateSecurityGroupRuleDescriptionsEgress'
                  - 'ec2:AllocateAddress'
                  - 'ec2:ReleaseAddress'
                  - 'ec2:AssociateAddress'
                  - 'ec2:DisassociateAddress'
                  - 'ec2:CreateVolume'
                  - 'ec2:AttachVolume'
                  - 'ec2:DetachVolume'
                  - 'ec2:DeleteVolume'
                  - 'ec2:ModifyVolume'
                Resource: '*'

        - PolicyName: iam-imageuiapp-scoped
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'iam:CreateRole'
                  - 'iam:DeleteRole'
                  - 'iam:GetRole'
                  - 'iam:UpdateRole'
                  - 'iam:UpdateRoleDescription'
                  - 'iam:PassRole'
                  - 'iam:TagRole'
                  - 'iam:UntagRole'
                  - 'iam:ListRoleTags'
                  - 'iam:AttachRolePolicy'
                  - 'iam:DetachRolePolicy'
                  - 'iam:PutRolePolicy'
                  - 'iam:GetRolePolicy'
                  - 'iam:DeleteRolePolicy'
                  - 'iam:ListAttachedRolePolicies'
                  - 'iam:ListRolePolicies'
                  - 'iam:CreateInstanceProfile'
                  - 'iam:DeleteInstanceProfile'
                  - 'iam:GetInstanceProfile'
                  - 'iam:AddRoleToInstanceProfile'
                  - 'iam:RemoveRoleFromInstanceProfile'
                  - 'iam:TagInstanceProfile'
                  - 'iam:UntagInstanceProfile'
                  - 'iam:ListInstanceProfiles'
                  - 'iam:ListInstanceProfilesForRole'
                Resource:
                  - !Sub 'arn:aws:iam::${AWS::AccountId}:role/imageuiapp*'
                  - !Sub 'arn:aws:iam::${AWS::AccountId}:instance-profile/imageuiapp*'

        - PolicyName: s3-bucket-readonly
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:ListBucket'
                  - 's3:GetBucketLocation'
                  - 's3:GetBucketTagging'
                  - 's3:PutBucketTagging'
                  - 's3:GetBucketPolicy'
                  - 's3:GetBucketAcl'
                  - 's3:GetBucketVersioning'
                  - 's3:GetBucketEncryption'
                  - 's3:GetBucketPublicAccessBlock'
                  - 's3:GetEncryptionConfiguration'
                Resource: !Ref S3BucketArn
              - Effect: Allow
                Action:
                  - 's3:GetObject'
                  - 's3:ListBucketVersions'
                Resource: !Sub '${S3BucketArn}/*'

        - PolicyName: alb-cleanup
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'elasticloadbalancing:Describe*'
                  - 'elasticloadbalancing:DeleteLoadBalancer'
                  - 'elasticloadbalancing:DeleteListener'
                  - 'elasticloadbalancing:DeleteTargetGroup'
                  - 'elasticloadbalancing:RemoveTags'
                Resource: '*'

        - PolicyName: acm-cleanup
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'acm:DescribeCertificate'
                  - 'acm:ListCertificates'
                  - 'acm:DeleteCertificate'
                  - 'acm:ListTagsForCertificate'
                Resource: '*'

        - PolicyName: route53-records
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'route53:GetHostedZone'
                  - 'route53:ListHostedZones'
                  - 'route53:ListHostedZonesByName'
                  - 'route53:ListResourceRecordSets'
                  - 'route53:ChangeResourceRecordSets'
                  - 'route53:GetChange'
                Resource: '*'

Outputs:

  AdminUserName:
    Description: Name of the new IAM user. Sign in as this user with InitialPassword.
    Value: !Ref AdminUser

  AdminUserArn:
    Description: ARN of the new IAM user.
    Value: !GetAtt AdminUser.Arn

  ConsoleSignInUrl:
    Description: Console sign-in URL for this account.
    Value: !Sub 'https://${AWS::AccountId}.signin.aws.amazon.com/console'

  ExpectedMfaSerial:
    Description: |
      The MFA device ARN once you assign a virtual MFA device with the
      same name as the user. Put this in .env as AWS_MFA_SERIAL.
    Value: !Sub 'arn:aws:iam::${AWS::AccountId}:mfa/${AdminUserName}'

  RoleArn:
    Description: ARN of the admin role. Put this in .env as AWS_ADMIN_ROLE_ARN.
    Value: !GetAtt AdminRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-RoleArn'

  AssumeRoleSnippet:
    Description: Example aws sts assume-role command.
    Value: !Sub
      - 'aws sts assume-role --role-arn ${RoleArn} --role-session-name imageuiapp-admin'
      - { RoleArn: !GetAtt AdminRole.Arn }
